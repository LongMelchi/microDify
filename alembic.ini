[alembic]
# Migration scripts are stored in the ``alembic/`` directory.
script_location = alembic

# The ``sqlalchemy.url`` value is intentionally left empty here.  The
# alembic ``env.py`` module overrides it at runtime by reading the
# actual value from ``app.core.config`` (see ``app/core/config.py``).
sqlalchemy.url =

# Logging is configured by Python's standard logging framework.
# Alembic emits its own log messages; the level below controls them.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
