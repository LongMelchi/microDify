services:
  pg:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-microdify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-microdify}
      POSTGRES_DB: ${POSTGRES_DB:-microdify}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-microdify}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - microdify-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - microdify-net
    restart: unless-stopped

  fastapi:
    build: .
    env_file: .env
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - uploads:/app/uploads
    networks:
      - microdify-net
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - microdify-net
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  uploads:
  caddy_data:
  caddy_config:

networks:
  microdify-net:
    driver: bridge
